services:
  postgres:
    image: postgres:16-alpine
    container_name: try-postgres
    environment:
      POSTGRES_DB: todo_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  adminer:
    image: adminer:latest
    container_name: todo-db-adminer
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    restart: unless-stopped

